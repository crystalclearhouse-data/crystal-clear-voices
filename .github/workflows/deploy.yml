name: CI / Deploy

# ─────────────────────────────────────────────────────────────────────────────
# Trigger matrix:
#   Branch push / PR  → test only (CI guard, no build, no deploy)
#   Tag push          → test → prepare → build → deploy → notify
#
# Tag patterns:
#   Per-service:  voice/v1.2.0  api/v2.0.0  webhook/v1.0.3  crew/v0.4.1  mcp/v0.9.1
#   Global:       v1.5.0   (builds + deploys all 5 services atomically)
#   Staging RC:   voice/v1.2.0-rc1   v1.5.0-rc1
#   Dev alpha:    voice/v1.2.0-alpha1   v1.5.0-alpha1
#
# Environment derivation (automatic from tag suffix):
#   *-alpha* or *-dev* → dev
#   *-rc*              → staging
#   clean semver       → production
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [master, main]
    paths:
      - 'api-server/**'
      - 'voice-server/**'
      - 'crew-service/**'
      - 'webhook-server/**'
      - 'mcp-server.js'
      - 'mcp-audit.js'
      - 'mcp-paths.js'
      - 'Dockerfile.mcp'
      - 'docker-compose.yml'
      - '.github/workflows/deploy.yml'
      - 'terraform/**'
      - 'workflows/index.json'
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
      - 'voice/v*'
      - 'api/v*'
      - 'webhook/v*'
      - 'crew/v*'
      - 'mcp/v*'
  pull_request:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy (or "all")'
        required: true
        default: 'all'
        type: choice
        options: [all, voice-server, api-server, webhook-server, crew-service, mcp-server]
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options: [dev, staging, production]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

# ─────────────────────────────────────────────────────────────────────────────
# Default permissions — locked down. Jobs that need AWS OIDC or GitHub
# Deployments API explicitly declare id-token:write / deployments:write.
# ─────────────────────────────────────────────────────────────────────────────
permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # LINT & TEST — runs on every push, PR, and tag
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            voice-server/package.json
            api-server/package.json
            webhook-server/package.json
            package.json

      - name: Install Node deps
        run: |
          npm ci --prefix voice-server
          npm ci --prefix api-server
          npm ci --prefix webhook-server
          npm ci

      - name: Syntax check JS (node --check)
        run: |
          node --check voice-server/server.js
          node --check voice-server/social-mcp.js
          node --check voice-server/hashtag-strategy.js
          node --check api-server/index.js
          node --check webhook-server/webhook-server.js
          node --check mcp-server.js

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: crew-service/requirements.txt

      - name: Install Python deps + ruff
        run: |
          pip install -r crew-service/requirements.txt --quiet
          pip install ruff --quiet

      - name: Lint Python (ruff)
        run: ruff check crew-service/

      - name: Validate workflow index.json
        run: node -e "JSON.parse(require('fs').readFileSync('workflows/index.json','utf8')); console.log('index.json valid')"

  # ─────────────────────────────────────────────────────────────────────────────
  # PREPARE — parse tag → derive services list + target environment
  # Only runs on tag pushes or workflow_dispatch
  # ─────────────────────────────────────────────────────────────────────────────
  prepare:
    name: Prepare (parse tag)
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    outputs:
      services:    ${{ steps.parse.outputs.services }}
      environment: ${{ steps.parse.outputs.environment }}

    steps:
      - name: Parse tag → services + environment
        id: parse
        run: |
          TAG="${GITHUB_REF_NAME:-manual}"
          DISPATCH_SVC="${{ github.event.inputs.service }}"
          DISPATCH_ENV="${{ github.event.inputs.environment }}"

          # ── Derive target services ──────────────────────────────────────────
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "$DISPATCH_SVC" == "all" ]]; then
              SERVICES='["voice-server","api-server","webhook-server","crew-service","mcp-server"]'
            else
              SERVICES="[\"${DISPATCH_SVC}\"]"
            fi
          elif [[ "$TAG" =~ ^voice/ ]];   then SERVICES='["voice-server"]'
          elif [[ "$TAG" =~ ^api/ ]];     then SERVICES='["api-server"]'
          elif [[ "$TAG" =~ ^webhook/ ]]; then SERVICES='["webhook-server"]'
          elif [[ "$TAG" =~ ^crew/ ]];    then SERVICES='["crew-service"]'
          elif [[ "$TAG" =~ ^mcp/ ]];     then SERVICES='["mcp-server"]'
          else
            SERVICES='["voice-server","api-server","webhook-server","crew-service","mcp-server"]'
          fi

          # ── Derive environment ──────────────────────────────────────────────
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ENV="$DISPATCH_ENV"
          elif [[ "$TAG" =~ (alpha|dev) ]]; then ENV="dev"
          elif [[ "$TAG" =~ -rc ]];         then ENV="staging"
          else                                   ENV="production"
          fi

          echo "Tag: $TAG  →  services=$SERVICES  environment=$ENV"
          echo "services=$SERVICES"  >> "$GITHUB_OUTPUT"
          echo "environment=$ENV"    >> "$GITHUB_OUTPUT"

  # ─────────────────────────────────────────────────────────────────────────────
  # BUILD & PUSH — matrix over targeted services
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: prepare
    if: vars.ENABLE_DEPLOY == 'true'

    # OIDC federation requires id-token:write — no stored AWS keys needed.
    permissions:
      contents:    read
      id-token:    write   # ← lets GitHub mint the OIDC JWT for AWS STS

    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.prepare.outputs.services) }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC — no static keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}
          # JWT is minted automatically by the action using the OIDC token.
          # IAM trust policy restricts assumption to tag pushes on this repo.

      - name: Log in to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve build context
        id: ctx
        run: |
          case "${{ matrix.service }}" in
            voice-server)   CTX="./voice-server";   DF="./voice-server/Dockerfile"   ;;
            api-server)     CTX="./api-server";     DF="./api-server/Dockerfile"     ;;
            webhook-server) CTX="./webhook-server"; DF="./webhook-server/Dockerfile" ;;
            crew-service)   CTX="./crew-service";   DF="./crew-service/Dockerfile"   ;;
            mcp-server)     CTX=".";                DF="./Dockerfile.mcp"            ;;
          esac
          REPO="${{ env.ECR_REGISTRY }}/crystal-clear-${{ matrix.service }}"
          echo "context=$CTX"                            >> "$GITHUB_OUTPUT"
          echo "dockerfile=$DF"                          >> "$GITHUB_OUTPUT"
          echo "image_latest=${REPO}:latest"             >> "$GITHUB_OUTPUT"
          echo "image_sha=${REPO}:${{ github.sha }}"     >> "$GITHUB_OUTPUT"
          echo "image_tag=${REPO}:${GITHUB_REF_NAME}"    >> "$GITHUB_OUTPUT"

      - name: Build & push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context:    ${{ steps.ctx.outputs.context }}
          file:       ${{ steps.ctx.outputs.dockerfile }}
          push:       true
          tags: |
            ${{ steps.ctx.outputs.image_latest }}
            ${{ steps.ctx.outputs.image_sha }}
            ${{ steps.ctx.outputs.image_tag }}
          cache-from: type=registry,ref=${{ steps.ctx.outputs.image_latest }}
          cache-to:   type=inline

  # ─────────────────────────────────────────────────────────────────────────────
  # DEPLOY — SSM to the correct environment's EC2 fleet
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy → ${{ needs.prepare.outputs.environment }}
    runs-on: ubuntu-latest
    needs: [prepare, build]
    if: vars.ENABLE_DEPLOY == 'true'
    environment: ${{ needs.prepare.outputs.environment }}

    permissions:
      contents:     read
      id-token:     write       # AWS OIDC
      deployments:  write       # GitHub Deployments API
      statuses:     write       # GitHub commit statuses

    outputs:
      deployment_id: ${{ steps.gh_deploy_create.outputs.deployment_id }}

    steps:
      - uses: actions/checkout@v4

      # ── Create GitHub Deployment record (visible in repo → Deployments) ──
      - name: Create GitHub deployment
        id: gh_deploy_create
        uses: actions/github-script@v7
        with:
          script: |
            const env = '${{ needs.prepare.outputs.environment }}';
            const services = JSON.parse('${{ needs.prepare.outputs.services }}');
            const d = await github.rest.repos.createDeployment({
              owner:             context.repo.owner,
              repo:              context.repo.repo,
              ref:               context.ref,
              environment:       env,
              description:       `Deploy [${services.join(', ')}] → ${env}`,
              required_contexts: [],   // skip branch-protection status checks
              auto_merge:        false,
              transient_environment: env !== 'production',
              production_environment: env === 'production',
            });
            core.setOutput('deployment_id', d.data.id);
            console.log(`Created deployment ${d.data.id}`);

      - name: Set deployment status → in_progress
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner:         context.repo.owner,
              repo:          context.repo.repo,
              deployment_id: '${{ steps.gh_deploy_create.outputs.deployment_id }}',
              state:         'in_progress',
              log_url:       `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`,
              description:   'Deploy in progress',
            });

      - name: Configure AWS credentials (OIDC — no static keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: Resolve EC2 target
        id: target
        run: |
          case "${{ needs.prepare.outputs.environment }}" in
            dev)        EC2_TAG="crystal-clear-voices-dev"     ;;
            staging)    EC2_TAG="crystal-clear-voices-staging" ;;
            production) EC2_TAG="crystal-clear-voices"         ;;
          esac
          echo "ec2_tag=$EC2_TAG" >> "$GITHUB_OUTPUT"

          COMPOSE_SVCS=$(echo '${{ needs.prepare.outputs.services }}' \
            | python3 -c "import sys,json; print(' '.join(json.load(sys.stdin)))")
          echo "compose_services=$COMPOSE_SVCS" >> "$GITHUB_OUTPUT"

      - name: Deploy via SSM
        run: |
          COMPOSE_SVCS="${{ steps.target.outputs.compose_services }}"
          SHA="${{ github.sha }}"
          REGISTRY="${{ env.ECR_REGISTRY }}"
          REGION="${{ env.AWS_REGION }}"

          aws ssm send-command \
            --targets "Key=tag:Name,Values=${{ steps.target.outputs.ec2_tag }}" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              \"set -e\",
              \"aws ecr get-login-password --region ${REGION} | docker login --username AWS --password-stdin ${REGISTRY}\",
              \"cd /opt/crystal-clear-voices\",
              \"git fetch origin && git reset --hard ${SHA}\",
              \"ECR_REGISTRY=${REGISTRY} docker compose pull ${COMPOSE_SVCS}\",
              \"ECR_REGISTRY=${REGISTRY} docker compose up -d --no-build --no-deps ${COMPOSE_SVCS}\",
              \"docker system prune -f\"
            ]" \
            --output text \
            --query "Command.CommandId"

      - name: Health checks
        id: health
        run: |
          sleep 20
          FAILED=0
          declare -A HEALTH_URLS=(
            ["voice-server"]="https://voice.thediscobass.com/health"
            ["api-server"]="https://api.voice.thediscobass.com/health"
            ["webhook-server"]="https://hooks.voice.thediscobass.com/health"
            ["crew-service"]="https://crew.voice.thediscobass.com/health"
            ["mcp-server"]="https://mcp.voice.thediscobass.com/health"
          )
          for svc in ${{ steps.target.outputs.compose_services }}; do
            URL="${HEALTH_URLS[$svc]:-}"
            if [[ -n "$URL" ]]; then
              echo "Checking $svc → $URL"
              curl --retry 5 --retry-delay 5 --retry-connrefused --silent --fail "$URL" \
                && echo "✅ $svc healthy" \
                || { echo "⚠️  $svc failed health check"; FAILED=1; }
            fi
          done
          echo "any_failed=$FAILED" >> "$GITHUB_OUTPUT"

      # ── Update GitHub Deployment record with final status ──────────────────
      - name: Set deployment status → success
        if: steps.health.outputs.any_failed == '0'
        uses: actions/github-script@v7
        with:
          script: |
            const envUrls = {
              'voice-server':   'https://voice.thediscobass.com',
              'api-server':     'https://api.voice.thediscobass.com',
              'webhook-server': 'https://hooks.voice.thediscobass.com',
              'crew-service':   'https://crew.voice.thediscobass.com',
              'mcp-server':     'https://mcp.voice.thediscobass.com',
            };
            const services = JSON.parse('${{ needs.prepare.outputs.services }}');
            const envUrl = envUrls[services[0]] ?? 'https://voice.thediscobass.com';
            await github.rest.repos.createDeploymentStatus({
              owner:         context.repo.owner,
              repo:          context.repo.repo,
              deployment_id: '${{ steps.gh_deploy_create.outputs.deployment_id }}',
              state:         'success',
              environment_url: envUrl,
              log_url:       `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`,
              description:   'All health checks passed',
            });

      - name: Set deployment status → failure
        if: steps.health.outputs.any_failed == '1'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner:         context.repo.owner,
              repo:          context.repo.repo,
              deployment_id: '${{ steps.gh_deploy_create.outputs.deployment_id }}',
              state:         'failure',
              log_url:       `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`,
              description:   'One or more health checks failed — check service logs',
            });

  # ─────────────────────────────────────────────────────────────────────────────
  # NOTIFY ON FAILURE
  # ─────────────────────────────────────────────────────────────────────────────
  notify:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [test, prepare, build, deploy]
    if: failure()
    env:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK }}

    steps:
      - name: Post to Discord
        if: env.DISCORD_WEBHOOK != ''
        run: |
          curl -sX POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{\"content\":\"❌ **CI\\/Deploy failed** — \`${GITHUB_REF_NAME}\` → ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # BUILD & PUSH IMAGES
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    outputs:
      voice-tag: ${{ steps.meta-voice.outputs.tags }}
      api-tag:   ${{ steps.meta-api.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Log in to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push voice-server
        id: meta-voice
        uses: docker/build-push-action@v5
        with:
          context: ./voice-server
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/crystal-clear-voice-server:latest
            ${{ env.ECR_REGISTRY }}/crystal-clear-voice-server:${{ github.sha }}

      - name: Build & push api-server
        id: meta-api
        uses: docker/build-push-action@v5
        with:
          context: ./api-server
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/crystal-clear-api-server:latest
            ${{ env.ECR_REGISTRY }}/crystal-clear-api-server:${{ github.sha }}

  # ─────────────────────────────────────────────────────────────────────────────
  # DEPLOY TO EC2
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Deploy via SSM
        run: |
          aws ssm send-command \
            --targets "Key=tag:Name,Values=crystal-clear-voices" \
            --document-name "AWS-RunShellScript" \
            --parameters commands='[
              "aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}",
              "docker pull ${{ env.ECR_REGISTRY }}/crystal-clear-voice-server:${{ github.sha }}",
              "docker pull ${{ env.ECR_REGISTRY }}/crystal-clear-api-server:${{ github.sha }}",
              "cd /opt/crystal-clear-voices",
              "SHA=${{ github.sha }} docker-compose up -d --no-build voice-server api-server",
              "docker system prune -f"
            ]' \
            --output text \
            --query "Command.CommandId"

      - name: Health check voice-server
        run: |
          sleep 15
          curl --retry 5 --retry-delay 5 --retry-connrefused \
            https://voice.thediscobass.com/health

      - name: Health check api-server
        run: |
          curl --retry 5 --retry-delay 5 --retry-connrefused \
            https://api.voice.thediscobass.com/health

  # ─────────────────────────────────────────────────────────────────────────────
  # NOTIFY ON FAILURE
  # ─────────────────────────────────────────────────────────────────────────────
  notify:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [build, deploy]
    if: failure()

    steps:
      - name: Post to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK }}
        run: |
          curl -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d '{
              "content": "❌ Deploy failed on `${{ github.ref_name }}` — ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }'

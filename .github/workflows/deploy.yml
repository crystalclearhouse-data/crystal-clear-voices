name: CI / Deploy

on:
  push:
    branches: [master, main]
    paths:
      - 'api-server/**'
      - 'voice-server/**'
      - 'crew-service/**'
      - 'docker-compose.yml'
      - '.github/workflows/deploy.yml'
      - 'terraform/**'
      - 'workflows/index.json'
  pull_request:
    branches: [master, main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # LINT & TEST — runs on every push and every PR
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            voice-server/package.json
            api-server/package.json
            webhook-server/package.json

      - name: Install Node deps
        run: |
          npm ci --prefix voice-server
          npm ci --prefix api-server
          npm ci --prefix webhook-server

      - name: Syntax check JS (node --check)
        run: |
          node --check voice-server/server.js
          node --check voice-server/social-mcp.js
          node --check voice-server/hashtag-strategy.js
          node --check api-server/index.js
          node --check webhook-server/webhook-server.js

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: crew-service/requirements.txt

      - name: Install Python deps + ruff
        run: |
          pip install -r crew-service/requirements.txt --quiet
          pip install ruff --quiet

      - name: Lint Python (ruff)
        run: ruff check crew-service/

      - name: Validate workflow index.json
        run: node -e "JSON.parse(require('fs').readFileSync('workflows/index.json','utf8')); console.log('index.json valid')"

  # ─────────────────────────────────────────────────────────────────────────────
  # BUILD & PUSH IMAGES
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    needs: test
    name: Build & Push Docker Images
    if: ${{ vars.ENABLE_DEPLOY == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      voice-tag: ${{ steps.meta-voice.outputs.tags }}
      api-tag:   ${{ steps.meta-api.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Log in to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push voice-server
        id: meta-voice
        uses: docker/build-push-action@v5
        with:
          context: ./voice-server
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/crystal-clear-voice-server:latest
            ${{ env.ECR_REGISTRY }}/crystal-clear-voice-server:${{ github.sha }}

      - name: Build & push api-server
        id: meta-api
        uses: docker/build-push-action@v5
        with:
          context: ./api-server
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/crystal-clear-api-server:latest
            ${{ env.ECR_REGISTRY }}/crystal-clear-api-server:${{ github.sha }}

      - name: Build & push crew-service
        id: meta-crew
        uses: docker/build-push-action@v5
        with:
          context: ./crew-service
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/crystal-clear-crew-service:latest
            ${{ env.ECR_REGISTRY }}/crystal-clear-crew-service:${{ github.sha }}

  # ─────────────────────────────────────────────────────────────────────────────
  # DEPLOY TO EC2
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    if: ${{ vars.ENABLE_DEPLOY == 'true' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main') }}
    runs-on: ubuntu-latest
    needs: [test, build]
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Deploy via SSM
        run: |
          aws ssm send-command \
            --targets "Key=tag:Name,Values=crystal-clear-voices" \
            --document-name "AWS-RunShellScript" \
            --parameters commands='[
              "aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}",
              "docker pull ${{ env.ECR_REGISTRY }}/crystal-clear-voice-server:${{ github.sha }}",
              "docker pull ${{ env.ECR_REGISTRY }}/crystal-clear-api-server:${{ github.sha }}",
              "cd /opt/crystal-clear-voices",
              "SHA=${{ github.sha }} docker-compose up -d --no-build voice-server api-server",
              "docker system prune -f"
            ]' \
            --output text \
            --query "Command.CommandId"

      - name: Health check voice-server
        run: |
          sleep 15
          curl --retry 5 --retry-delay 5 --retry-connrefused \
            https://voice.thediscobass.com/health

      - name: Health check api-server
        run: |
          curl --retry 5 --retry-delay 5 --retry-connrefused \
            https://api.voice.thediscobass.com/health

  # ─────────────────────────────────────────────────────────────────────────────
  # NOTIFY ON FAILURE
  # ─────────────────────────────────────────────────────────────────────────────
  notify:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [test, build, deploy]
    if: failure()
    env:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK }}

    steps:
      - name: Post to Discord
        if: ${{ env.DISCORD_WEBHOOK != '' }}
        run: |
          curl -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d '{
              "content": "❌ Deploy failed on `${{ github.ref_name }}` — ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }'

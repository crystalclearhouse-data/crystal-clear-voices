services:

  voice-server:
    build: ./voice-server
    ports:
      - "3001:3001"
    env_file: ./voice-server/.env
    environment:
      NODE_ENV: development
    restart: unless-stopped
    depends_on:
      - postgres
    volumes:
      - voice-audio:/app/audio

  api-server:
    build: ./api-server
    ports:
      - "3000:3000"
    env_file: ./api-server/.env
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: crystalcleardb
      DB_USER: postgres
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: crystalcleardb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-localdev}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      N8N_BASIC_AUTH_ACTIVE: "false"
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: postgres
      DB_POSTGRESDB_PASSWORD: ${DB_PASSWORD:-localdev}
    volumes:
      - n8n-data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  crew-service:
    build: ./crew-service
    ports:
      - "8000:8000"
    env_file: ./voice-server/.env
    environment:
      SOPHIE_URL: http://voice-server:3001
    restart: unless-stopped
    depends_on:
      - voice-server

volumes:
  postgres-data:
  n8n-data:
  voice-audio:
